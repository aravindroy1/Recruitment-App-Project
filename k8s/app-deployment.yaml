apiVersion: apps/v1
kind: Deployment
metadata:
  name: recruitment-app
  namespace: recruitment-app
  labels:
    app: recruitment-app

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: recruitment-app

  template:
    metadata:
      labels:
        app: recruitment-app

    spec:
      containers:
      - name: recruitment-container
        image: aravindroy1/recruitment-app:latest

        ports:
        - containerPort: 3000

        envFrom:
        - configMapRef:
            name: recruitment-config

        resources:
          requests:
            cpu: "200m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
